<!DOCTYPE html>
<!-- ══════════════════════════════════════════════════════
     404.html — Custom error page for Vishesh Jaiswal Portfolio
     Theme matches main portfolio: dark space / cosmic aesthetic
     Auto-redirects to home after 8 seconds via JS countdown.
══════════════════════════════════════════════════════ -->
<html lang="en">
<head>
  <!-- ── Meta ── -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | Vishesh Jaiswal</title>

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- ── Icons ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="images/logo.png">

  <style>
    /* ── Design tokens (match main portfolio) ── */
    :root {
      --bg:  #050510;
      --v:   #7c5cfc;
      --c:   #00e5c8;
      --g:   #ffcc47;
      --t:   #e8e8ff;
      --t2:  #8080a8;
      --fh:  'Space Grotesk', sans-serif;
      --fb:  'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--t);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 24px;
    }

    /* Star canvas behind everything */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Centered content wrapper */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    /* Giant glowing 404 */
    .num {
      font-family: var(--fh);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--v) 0%, var(--c) 60%, var(--g) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(124,92,252,0.5));
      margin-bottom: 8px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(124,92,252,0.5)); }
      50%       { filter: drop-shadow(0 0 70px rgba(0,229,200,0.6)); }
    }

    /* Astronaut emoji floating */
    .astro {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      display: block;
      margin-bottom: 16px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0)   rotate(-5deg); }
      50%       { transform: translateY(-18px) rotate(8deg); }
    }

    h1 {
      font-family: var(--fh);
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--t);
    }

    p {
      color: var(--t2);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Countdown badge */
    .countdown {
      display: inline-block;
      background: rgba(124,92,252,0.15);
      border: 1px solid rgba(124,92,252,0.3);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: .88rem;
      color: var(--t2);
      margin-bottom: 28px;
    }

    .countdown span {
      color: var(--c);
      font-weight: 600;
    }

    /* CTA button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 100px;
      font-family: var(--fh);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      background: linear-gradient(135deg, var(--v), var(--c));
      color: #fff;
      box-shadow: 0 0 30px rgba(124,92,252,0.35);
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 50px rgba(124,92,252,0.55);
    }

    /* Progress bar at bottom */
    .prog-wrap {
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      margin: 28px auto 0;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--v), var(--c));
      transform-origin: left;
      animation: drain 8s linear forwards;
    }

    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>

<body>
  <!-- Star background canvas -->
  <canvas id="c404"></canvas>

  <div class="wrap">
    <span class="astro">🧑‍🚀</span>

    <!-- Giant error number -->
    <div class="num">404</div>

    <h1>Lost in Space</h1>

    <p>
      Oops! The page you're looking for has drifted into a black hole.
      <br>Let's get you back to solid ground.
    </p>

    <!-- Live countdown before auto-redirect -->
    <div class="countdown">
      Returning to home in <span id="cd">8</span>s
    </div>

    <br>

    <!-- Manual home button -->
    <a href="/" class="btn">
      <i class="fas fa-home"></i> Back to Home
    </a>

    <!-- Redirect progress bar (drains over 8s) -->
    <div class="prog-wrap"><div class="prog-fill"></div></div>
  </div>

  <script>
    /* ── Countdown + auto-redirect ── */
    let t = 8;
    const el = document.getElementById('cd');
    const timer = setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) { clearInterval(timer); window.location.href = '/'; }
    }, 1000);

    /* ── Mini star canvas for 404 page ── */
    (function() {
      const cv  = document.getElementById('c404');
      const ctx = cv.getContext('2d');
      let W, H, stars = [];

      function resize() {
        W = cv.width  = window.innerWidth;
        H = cv.height = window.innerHeight;
        stars = Array.from({ length: 220 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.4 + 0.2,
          a: Math.random() * 0.7 + 0.15,
          sp: Math.random() * 0.02 + 0.004,
          ph: Math.random() * Math.PI * 2,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.ph += s.sp;
          const a = s.a * (0.5 + 0.5 * Math.sin(s.ph));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220,220,255,${a})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      draw();
    })();
  </script>
</body>
</html>
